<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Ibrahim ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #090a0f;
            color: #ffffff;
            font-family: 'Quicksand', sans-serif;
            text-align: center;
            scroll-behavior: smooth;
        }

        /* Halaman Depan (Intro) */
        .intro-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }

        .play-btn {
            background: #ffb6c1;
            color: #444;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 182, 193, 0.4);
            margin-top: 20px;
        }

        /* Konten Utama (Disembunyikan dulu) */
        .main-content {
            display: none; /* Akan muncul pas diklik */
            padding: 20px;
        }

        .card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 35px 20px;
            margin: 40px auto;
            max-width: 350px;
