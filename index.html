<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Keduaku - Warna Baru</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* 👇 INI BAGIAN YANG AKU GANTI WARNANYA (TEMA HITAM GOLD) */
            background: linear-gradient(135deg, #1a1a1a 0%, #434343 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ffca28; /* Warna border jadi emas */
            margin-bottom: 10px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .link-card {
            /* 👇 WARNA TOMBOL JUGA AKU SESUAIKAN */
            background: rgba(255, 202, 40, 0.2); 
            backdrop-filter: blur(10px);
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            text-decoration: none;
            color: #ffca28;
            display: block;
            font-weight: bold;
            border: 1px solid #ffca28;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://placecats.com/300/300" alt="Foto Profil" class="profile-img">
        
        <h2>Halo, Ini Web Keduaku!</h2>
        <p>Tampilannya sekarang jadi lebih elegan.</p>

        <a href="https://github.com/ISI-USERNAME-MU-DISINI" class="link-card">Lihat GitHub Saya</a>
        <a href="#" class="link-card">Kirim Pesan</a>
    </div>

</body>
</html>
